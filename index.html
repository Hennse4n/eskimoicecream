<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" href="muñeco.png" type="image/x-icon">
    <title>Eskimo Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @font-face {
            font-family: Frankfurter;
            src: url('Frankfurter Std Regular/Frankfurter Std Regular.otf');
        }
        body {
            background-color: #256bb1;
        }
        h1, h2, h3 {
            color: #fff;
        }
        h1{
            font-family: Frankfurter, sans-serif;
            font-size: 4rem;
        }
        .title1{
            font-size: 4rem;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            text-align: center;}
        .mainTitle {
            font-size: 10rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .subtitle {
            font-size: 2rem;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .mainSubtitle {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .warning {
            font-size: 3rem;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
    </style>
  </head>
  <body>
    <div class="row">
        <h1 class="title1">¡Guatemala se está congelando!</h1>
    </div>
    <br>
    <br>
    <div class="row">
        <div class="col-md-6">
            <h3>Descubre por qué, deslizando hacia abajo</h3>
            
        </div>
        <div class="col-md-6">
            <!--Imagen de una flecha señalando hacia abajo-->
            <img src="https://images.vexels.com/media/users/3/145322/isolated/lists/f0c38c0f4e2d29c8ff3ac78f869d5465-ilustracion-de-flecha-hacia-abajo.png" alt="flecha hacia abajo" class="img-fluid">
        </div>
    </div>
    <br>
    <br>
    <div class="row">
        <!--imagen de skimo-->
        <div class="col-md-12">
            <img width='1000px' src="muñeco.png" alt="skimo" class="img-fluid">
        </div>
        
    </div>
    <br>
    <br>
    <div class="row">
        <h3 class="warning">Todo esto es porque...</h3>
    </div>
    <br>
    <br>
    <div class="row">
        <h1 class="mainTitle">ESKIMO</h1>
    </div>
    <div class="row">
        <h3 class="subtitle">¡Está de vuelta!</h3>
    </div>
    <div class="row">
        <h3 class="subtitle">¡Y esta vez es más frío que nunca!</h3>
    </div>
    <br>
    <div class="row">
        <h2 class="mainSubtitle">Descubre nuestros productos</h2>
    </div>
    <div class="row">
        <div class="col-md-6 bs-info-bg-subtle">
            <div class="row">
                <!--Imagen de los tres botes de helado-->
                <img src="boteshelado.jpeg" alt="botes de helado" class="img-fluid">
            </div>
            <br>
            <div class="row">
                <!--Imagen del helado terminado-->
                <img src="heladoterminado.jpeg" alt="helado terminado" class="img-fluid">
            </div>
        </div>
        <div class="col-md-6 bs-info-bg-subtle">
            <!--Arte gráfico-->
            <img src="arte.jpeg" alt="arte gráfico" class="img-fluid">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
